name: Build iOS (IPA)

on:
  workflow_dispatch:   # iOS builds need real Apple certs, so run manually/on release tags
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART_B64 }}" | base64 -d > lib/firebase_options.dart

      # --- iOS code signing setup ---
      # You need, as GitHub secrets (from your Apple Developer account):
      #   IOS_CERTIFICATE_BASE64      (.p12 export of your distribution certificate)
      #   IOS_CERTIFICATE_PASSWORD
      #   IOS_PROVISION_PROFILE_BASE64 (.mobileprovision for App Store distribution)
      - name: Install signing certificate
        env:
          CERT_B64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 -d > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/sportlivetv.mobileprovision

      - name: Get dependencies
        run: flutter pub get

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportlivetv-release-ipa
          path: build/ios/ipa/*.ipa
