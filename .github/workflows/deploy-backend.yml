name: Deploy Backend (Cloud Functions + Firestore Rules)

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase/**'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      # Generate this token locally with: firebase login:ci
      # Then store it as the repo secret FIREBASE_TOKEN
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only functions,firestore:rules,firestore:indexes,storage --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.FIREBASE_PROJECT_ID }}"
