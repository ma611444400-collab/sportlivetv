name: Debug APK Build (No Secrets Needed)

# Fudud - waxay samaysaa APK "debug" ah oo aan loo baahnayn keystore/secrets,
# si aad si degdeg ah u tijaabiso app-ka telefoonkaaga.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportlivetv-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
